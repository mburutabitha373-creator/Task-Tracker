<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Task Tracker SPA</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>📝 Task Tracker</h1>

    <form id="task-form">
      <input type="text" id="task-input" placeholder="Enter a task..." />
      <button type="submit">Add Task</button>
    </form>

    <p id="error"></p>

    <ul id="task-list"></ul>

  </div>

  <script src="script.js"></script>
</body>
</html>
